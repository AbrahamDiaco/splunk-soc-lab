# inputs.conf — Universal Forwarder (Kali Linux)
# Emplacement : /opt/splunkforwarder/etc/system/local/inputs.conf
# Collecte des logs systeme/authentification Linux

[monitor:///var/log/auth.log]
disabled = 0
index = main
sourcetype = linux_secure

[monitor:///var/log/syslog]
disabled = 0
index = main

# Note : l'utilisateur least-privileged "splunkfwd" doit appartenir
# au groupe "adm" pour avoir le droit de lire ces fichiers :
#   sudo usermod -aG adm splunkfwd
#   sudo /opt/splunkforwarder/bin/splunk restart
